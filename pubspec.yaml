name: lessdo
description: "LessDo - a calm, smart to-do list and focus timer."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^22.0.0
  flutter_timezone: ^5.0.2
  intl: ^0.20.2
  local_auth: ^3.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  timezone: ^0.11.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  app_links: ^7.0.0
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  sqflite_common_ffi: ^2.3.6

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/branding/app_icon.png"
  web:
    generate: true
    image_path: "assets/branding/app_icon.png"
    background_color: "#5BC89A"
    theme_color: "#5BC89A"
